name: Update Vidiots Calendar Feed

on:
  schedule:
    # 13:00 UTC = 6am PDT / 5am PST -- adjust if you want a different time
    - cron: "0 13 * * *"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run scraper
        run: |
          mkdir -p docs
          python scrape_vidiots.py --out docs/vidiots.ics

      - name: Commit updated feed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/vidiots.ics
          git diff --staged --quiet || git commit -m "Update Vidiots showtimes feed"
          git push
